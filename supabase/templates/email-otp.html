<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Verification Code</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #09090b;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 480px;
            margin: 40px auto;
            padding: 24px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Nebula Glow Effect */
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(234, 179, 8, 0.15), transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 24px;
            /* Gold/Orange Gradient matching Primary */
            background: linear-gradient(to right, #facc15, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .title {
            font-size: 20px;
            color: #f4f4f5;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: #a1a1aa;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .code-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 0 20px rgba(234, 179, 8, 0.05);
        }

        .code {
            font-family: 'Courier New', monospace;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #facc15;
            /* Primary Gold */
            margin: 0;
            text-shadow: 0 0 20px rgba(234, 179, 8, 0.4);
        }

        .footer {
            font-size: 12px;
            color: #52525b;
            margin-top: 32px;
            border-top: 1px solid #27272a;
            padding-top: 24px;
        }

        .link {
            color: #71717a;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
            <div class="logo">Doto Folio</div>
            <h1 class="title">Verify your email</h1>
            <p class="subtitle">Enter this code to complete your login.</p>

            <div class="code-box">
                <p class="code">{{ .Token }}</p>
            </div>

            <p class="subtitle" style="margin-bottom: 0; font-size: 13px;">This code expires in 10 minutes.</p>

            <div class="footer">
                <p>If you didn't request this code, you can safely ignore this email.</p>
            </div>
        </div>
    </div>
</body>

</html>
