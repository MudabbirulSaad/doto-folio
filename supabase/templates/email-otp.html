<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="supported-color-schemes" content="dark">
    <title>Your Verification Code</title>
    <style>
        @media only screen and (max-width: 600px) {
            .email-shell {
                width: 100% !important;
            }

            .email-outer {
                padding: 16px 10px !important;
            }

            .email-content {
                padding: 24px 18px !important;
            }

            .email-header {
                padding: 28px 18px 22px !important;
            }

            .email-title {
                font-size: 24px !important;
                line-height: 1.22 !important;
            }

            .code {
                font-size: 34px !important;
                letter-spacing: 6px !important;
            }
        }
    </style>
</head>

<body style="margin: 0; padding: 0; background-color: #1d1d1d; color: #f2f2ef; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; line-height: 1.6;">
    <div style="display: none; max-height: 0; overflow: hidden; opacity: 0; color: transparent;">Use this code to complete your login.</div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width: 100%; background-color: #1d1d1d; border-collapse: collapse;">
        <tr>
            <td class="email-outer" align="center" style="padding: 28px 12px;">
                <table role="presentation" class="email-shell" width="600" cellpadding="0" cellspacing="0" style="width: 600px; max-width: 600px; background-color: #242424; border: 1px solid #3d3a32; border-radius: 14px; border-collapse: separate; overflow: hidden;">
                    <tr>
                        <td class="email-header" style="padding: 34px 30px 26px; border-top: 4px solid #ead99f; border-bottom: 1px solid #3d3a32; text-align: left;">
                            <p style="margin: 0 0 10px; color: #ead99f; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;">SAAD Portfolio</p>
                            <h1 class="email-title" style="margin: 0; color: #f2f2ef; font-size: 28px; line-height: 1.2; font-weight: 700; letter-spacing: 0;">Verify your email</h1>
                            <p style="margin: 10px 0 0; color: #c7c2b7; font-size: 15px; line-height: 1.55;">Enter this code to complete your login.</p>
                        </td>
                    </tr>
                    <tr>
                        <td class="email-content" style="padding: 30px; background-color: #242424;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width: 100%; background-color: #2d2b26; border: 1px solid #3d3a32; border-radius: 12px; border-collapse: separate; margin: 0 0 18px;">
                                <tr>
                                    <td style="padding: 26px 18px; text-align: center;">
                                        <p class="code" style="margin: 0; color: #ead99f; font-family: 'Courier New', Courier, monospace; font-size: 40px; line-height: 1.2; font-weight: 700; letter-spacing: 8px;">{{ .Token }}</p>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin: 0 0 18px; color: #c7c2b7; font-size: 15px; line-height: 1.65;">This code expires in 10 minutes. If you did not request it, you can safely ignore this email.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 22px 30px; background-color: #202020; border-top: 1px solid #3d3a32; text-align: center;">
                            <p style="margin: 0; color: #8e887d; font-size: 12px; line-height: 1.6;">This automated email helps keep your SAAD Portfolio account secure.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
